name: Deploy to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'fn-mcp-apple'
  PYTHON_VERSION: '3.12'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies using matching Linux image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            mcr.microsoft.com/azure-functions/python:4-python3.12 \
            bash -c "pip install -r requirements.txt \
              --target='.python_packages/lib/site-packages' \
              --no-cache-dir"

      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.github*" \
            --exclude "Dockerfile" \
            --exclude "docker-compose.yml" \
            --exclude ".env*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"
          echo "Zip created: $(du -sh deploy.zip)"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --resource-group rg-mcp-calendar \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --src deploy.zip \
            --timeout 300
